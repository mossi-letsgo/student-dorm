<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สมัครสมาชิก</title>

    <link rel="stylesheet" href="../css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body class="login-page">

<div class="login-box">

    <h2>สมัครสมาชิก</h2>

    <div class="input-group">
        <label>ชื่อ - นามสกุล</label>
        <input type="text" id="fullname" placeholder="กรอกชื่อ - นามสกุล">
    </div>

    <div class="input-group">
        <label>รหัสนักศึกษา</label>
        <input type="text" id="studentId" placeholder="เช่น 66338010001">
    </div>

    <div class="input-group">
        <label>คณะ / แผนก</label>
        <input type="text" id="faculty" placeholder="เช่น วิทยาศาสตร์">
    </div>

    <div class="input-group">
        <label>สาขา</label>
        <input type="text" id="major" placeholder="เช่น วิทยาการคอมพิวเตอร์">
    </div>

    <div class="input-group">
        <label>เบอร์โทรศัพท์</label>
        <input type="tel" id="phone" placeholder="08xxxxxxxx">
    </div>

    <div class="input-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="example@gmail.com">
    </div>

    <div class="input-group">
        <label>รหัสผ่าน</label>
        <input type="password" id="password" placeholder="อย่างน้อย 6 ตัวอักษร">
    </div>

    <div class="input-group">
        <label>ยืนยันรหัสผ่าน</label>   
        <input type="password" id="confirmPassword" placeholder="กรอกรหัสผ่านอีกครั้ง">
    </div>

    <button class="login-btn" id="registerBtn">
        สมัครสมาชิก
    </button>

    <div class="bottom-text">
        มีบัญชีอยู่แล้ว ?
        <a href="login.html">เข้าสู่ระบบ</a>
    </div>

</div>

<script type="module" src="../js/register.js"></script>

</body>
</html>
