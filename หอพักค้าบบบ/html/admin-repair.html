  <div class="main">

    <!-- ================= TOPBAR ================= -->

    <div class="topbar">

        <div>

            <h2>จัดการแจ้งซ่อม</h2>

            <p id="adminName">
                Loading...
            </p>

        </div>

    </div>

    <!-- ================= SUMMARY ================= -->

    <div class="cards">

        <div class="card">

            <i class="fa-solid fa-screwdriver-wrench"></i>

            <h3>รายการทั้งหมด</h3>

            <h1 id="totalRepair">0</h1>

        </div>

        <div class="card">

            <i class="fa-solid fa-hourglass-half"></i>

            <h3>รอดำเนินการ</h3>

            <h1 id="pendingRepair">0</h1>

        </div>

        <div class="card">

            <i class="fa-solid fa-hammer"></i>

            <h3>กำลังซ่อม</h3>

            <h1 id="repairingRepair">0</h1>

        </div>

        <div class="card">

            <i class="fa-solid fa-circle-check"></i>

            <h3>ซ่อมเสร็จ</h3>

            <h1 id="completedRepair">0</h1>

        </div>

    </div>
    <!-- ================= REPAIR LIST ================= -->

    <div class="welcome">

        <h2>

            <i class="fa-solid fa-list-check"></i>

            รายการแจ้งซ่อม

        <div id="repairContainer">

            กำลังโหลด...
