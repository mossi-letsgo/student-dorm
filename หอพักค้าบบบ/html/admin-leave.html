        <li>

<li>

                ออกจากระบบ
            </a>
        </li>

    </ul>

</div>

<!-- ================= MAIN ================= -->

<div class="main">

    <div class="topbar">

        <div>

            <h2>คำขอเลิกเช่า</h2>

            <p id="adminName">
                กำลังโหลด...
            </p>

        </div>

    </div>

    <!-- ================= CARDS ================= -->

    <div class="cards">

        <div class="card">

            <i class="fa-solid fa-file-circle-question"></i>

            <h3>คำขอทั้งหมด</h3>

            <h1 id="totalLeave">
                0
            </h1>

        </div>

        <div class="card">

            <i class="fa-solid fa-clock"></i>

            <h3>รออนุมัติ</h3>

            <h1 id="pendingLeave">
                0
            </h1>

        </div>

        <div class="card">

            <i class="fa-solid fa-circle-check"></i>

            <h3>อนุมัติแล้ว</h3>

            <h1 id="approvedLeave">
                0
            </h1>

        </div>

        <div class="card">

            <i class="fa-solid fa-circle-xmark"></i>

            <h3>ปฏิเสธ</h3>

            <h1 id="rejectedLeave">
                0
            </h1>

        </div>

    </div>

    <!-- ================= LIST ================= -->

    <div class="welcome">

        <h2>

            <i class="fa-solid fa-list"></i>

            รายการคำขอเลิกเช่า

        </h2>

        <div
            id="leaveContainer"

            style="
                display:grid;
                grid-template-columns:repeat(auto-fit,minmax(420px,1fr));
                gap:20px;
                margin-top:20px;
            ">

            <!-- JS Render -->

        </div>

    </div>

</div>

<script type="module" src="../js/admin-leave.js"></script>

<script type="module" src="../js/theme.js"></script>
<script type="module" src="../js/owner-notification.js"></script>
</body>
