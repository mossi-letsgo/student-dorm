<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ห้องพัก | ระบบหอพัก</title>

    <link rel="stylesheet" href="/css/dashboard.css">
    <script type="module" src="../js/theme.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

    <div class="logo">🏢 Dormitory</div>

    <ul>

        <li>
            <a href="dashboard.html">
                <i class="fa-solid fa-house"></i> หน้าหลัก
            </a>
        </li>

        <li>
            <a href="rooms.html">
                <i class="fa-solid fa-bed"></i> ห้องพัก 
            </a>
        </li>

        <li class="active">
            <a href="booking.html">
                <i class="fa-solid fa-calendar-check"></i> จองห้องพัก
            </a>
        </li>

        <li>
            <a href="repair.html">
                <i class="fa-solid fa-screwdriver-wrench"></i> แจ้งซ่อม
            </a>
        </li>

        <li>
            <a href="profile.html">
                <i class="fa-solid fa-user"></i> โปรไฟล์
            </a>
        </li>

        <li>
            <a href="#" id="logoutBtn">
                <i class="fa-solid fa-right-from-bracket"></i> ออกจากระบบ
            </a>
        </li>

    </ul>

</div>

<!-- MAIN -->
<div class="main">

    <!-- TOP -->
    <div class="topbar">
        <div>
            <h2>ห้องพักทั้งหมด</h2>
            <p>เลือกห้องที่ต้องการจอง</p>
        </div>
    </div>

    <!-- FILTER -->
    <div class="welcome">

        <h2><i class="fa-solid fa-filter"></i> ประเภทห้อง</h2>

        <div class="room-filter">

    <button class="btn active-filter" onclick="filterRoom('all')">
        <i class="fa-solid fa-border-all"></i>
        ทั้งหมด
    </button>

    <button class="btn" onclick="filterRoom('small')">
        <i class="fa-solid fa-house"></i>
        ห้องเล็ก
    </button>

    <button class="btn" onclick="filterRoom('medium')">
        <i class="fa-solid fa-building"></i>
        ห้องกลาง
    </button>

    <button class="btn" onclick="filterRoom('large')">
        <i class="fa-solid fa-hotel"></i>
        ห้องใหญ่
    </button>

</div>

    </div>

    <!-- ROOM LIST -->
    <div class="welcome">

        <h2><i class="fa-solid fa-door-open"></i> รายการห้องพัก</h2>

        <div id="roomContainer"
             style="
                display:grid;
                grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
                gap:20px;
                margin-top:20px;
             ">
        </div>

    </div>

</div>

<script type="module" src="../js/booking.js"></script>
 <script type="module" src="../js/theme.js"></script>
    <script type="module" src="../js/dashboard.js"></script>
</body>
</html>
